<body class="bg-white mx-auto">
<div class="w-full bg-[#FF510C] h-13 lg:h-[70px] flex items-center justify-center  " ><p class="text-white font-bold text-[13px] flex-nowrap flex lg:text-[17px]">تا ۷۰٪ تخفیف برای لوازم جانبی اورجینال آیفون</p></div>

    <div class="line-1 flex items-center h-1/2 mx-auto px-4 justify-between container lg:px-20">

        </a>

            <div class="inputbox relative flex-1 lg:w-90">
                <input type="text" name="search" id="search-lg" placeholder="جستجو کنید" class="w-full h-12 bg-[#FBFBFB] focus:outline-none rounded-full px-4 text-[17px] placeholder:text-[16px] placeholder:font-normal placeholder:text-[#303030]">
                <a href="#"><img src="./src/img/svg/mag-lg.svg" alt="mag" class="absolute size-5 top-1/2 -translate-y-1/2 left-4"></a>
            </div>
        </div>

        <div class="buttons flex gap-[10px] h-[23px] w-14 pt-1 lg:h-[46px] lg:w-23 shrink-0">

            <input type="text" name="search" placeholder="جستجو کنید" class="w-full h-12 bg-[#F1F1F1] focus:outline-none rounded-full px-4 text-[17px] placeholder:text-[16px] placeholder:font-normal placeholder:text-[#303030]">
            <img src="./src/img/svg/mag-lg.svg" alt="mag" class="absolute size-5 top-1/2 -translate-y-1/2 left-4">
